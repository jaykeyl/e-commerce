services:

  backend: 
    build: ./backend 
    ports: 
      - "3001:3000" 
    volumes: 
      - ./backend:/app 
      - /app/node_modules 
    depends_on: 
      - postgres
      
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"

  mongodb:
    image: mongo:8
    restart: always
    container_name: mongoecommerce
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123

    ports:
      - "27018:27017"

    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    restart: always

    depends_on:
      - mongodb

    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/

      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123

    ports:
      - "8082:8081"

volumes:
  mongo_data: